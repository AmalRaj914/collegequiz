<!DOCTYPE html>
<html>

<head>

<title>Publish Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">

Published Quiz Management

</h2>

<table class="table table-bordered table-hover shadow">

<thead class="table-dark">

<tr>

<th>Quiz</th>

<th>Department</th>

<th>Questions</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for quiz in quizzes %}

<tr>

<td>{{ quiz.title }}</td>

<td>{{ quiz.department.department_name }}</td>

<td>{{ quiz.total_questions }}</td>

<td>

{% if quiz.status %}

<span class="badge bg-success">

Published

</span>

{% else %}

<span class="badge bg-warning">

Draft

</span>

{% endif %}

</td>

<td>

{% if quiz.status %}

<button class="btn btn-success" disabled>

Published

</button>

{% else %}

<a href="{% url 'publish' quiz.id %}"

class="btn btn-primary">

Publish

</a>

{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
