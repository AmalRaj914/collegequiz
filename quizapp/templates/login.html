{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>College Quiz Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{

    margin:0;

    padding:0;

    background:linear-gradient(135deg,#0d6efd,#6610f2);

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:Segoe UI;

}

.login-card{

    width:420px;

    background:white;

    border-radius:20px;

    box-shadow:0px 10px 35px rgba(0,0,0,.25);

    overflow:hidden;

}

.header{

    background:#0d6efd;

    color:white;

    text-align:center;

    padding:30px;

}

.header img{

    width:90px;

    height:90px;

    border-radius:50%;

    background:white;

    padding:10px;

}

.header h2{

    margin-top:15px;

    font-weight:bold;

}

.header p{

    margin:0;

    font-size:15px;

}

.card-body{

    padding:35px;

}

.form-control{

    height:50px;

    border-radius:10px;

}

.btn-login{

    width:100%;

    height:50px;

    border-radius:10px;

    font-size:18px;

    font-weight:bold;

}

.footer{

    text-align:center;

    padding:15px;

    color:gray;

    font-size:14px;

}

</style>

</head>

<body>

<div class="login-card">

<div class="header">

<!-- Replace with your college logo -->
<img src="{% static 'images/DBC-Logo.jpg' %}" alt="College Logo">

<h2>BCA Quiz Portal</h2>

<p>Faculty & Student Login</p>

</div>

<div class="card-body">

{% if messages %}

{% for message in messages %}

<div class="alert alert-danger">

{{ message }}

</div>

{% endfor %}

{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">

<i class="bi bi-person-fill"></i>

Username

</label>

<input

type="text"

name="username"

class="form-control"

placeholder="Enter Username"

required>

</div>

<div class="mb-3">

<label class="form-label">

<i class="bi bi-lock-fill"></i>

Password

</label>

<div class="input-group">

<input

type="password"

name="password"

id="password"

class="form-control"

placeholder="Enter Password"

required>

<button

class="btn btn-outline-secondary"

type="button"

onclick="togglePassword()">

<i class="bi bi-eye" id="eyeIcon"></i>

</button>

</div>

</div>

<br>

<button class="btn btn-primary btn-login">

<i class="bi bi-box-arrow-in-right"></i>

Login

</button>

</form>

</div>

<div class="footer">

© 2026 BCA Department

</div>

</div>

<script>

function togglePassword(){

    var password=document.getElementById("password");

    var eye=document.getElementById("eyeIcon");

    if(password.type==="password"){

        password.type="text";

        eye.className="bi bi-eye-slash";

    }

    else{

        password.type="password";

        eye.className="bi bi-eye";

    }

}

</script>

</body>

</html>
