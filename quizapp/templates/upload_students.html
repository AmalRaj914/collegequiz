<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Upload Student Excel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
rel="stylesheet">

<style>

body{

    background:#f4f6f9;

}

.upload-card{

    max-width:750px;

    margin:50px auto;

    border:none;

    border-radius:20px;

    box-shadow:0px 10px 25px rgba(0,0,0,.15);

}

.card-header{

    background:#0d6efd;

    color:white;

    text-align:center;

    font-size:28px;

    font-weight:bold;

    padding:20px;

    border-radius:20px 20px 0 0;

}

.upload-box{

    border:3px dashed #0d6efd;

    border-radius:15px;

    padding:40px;

    text-align:center;

    background:#fafcff;

    cursor:pointer;

    transition:.3s;

}

.upload-box:hover{

    background:#eef5ff;

}

.upload-box i{

    font-size:70px;

    color:#0d6efd;

}

.file-name{

    margin-top:15px;

    font-size:17px;

    color:green;

    font-weight:bold;

}

.btn-upload{

    width:100%;

    height:50px;

    font-size:18px;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<div class="card upload-card">

<div class="card-header">

<i class="bi bi-file-earmark-excel-fill"></i>

Upload Student Excel

</div>

<div class="card-body p-5">

{% if messages %}

{% for message in messages %}

<div class="alert alert-success">

{{ message }}

</div>

{% endfor %}

{% endif %}

<div class="alert alert-info">

<b>Excel Format :</b>

S.No | Roll No | Name

<br>

Department will be assigned automatically from the logged-in Faculty.

</div>

<form method="POST"
enctype="multipart/form-data">

{% csrf_token %}

<div class="row mb-4">

<div class="col-md-6">

<label class="form-label">

Batch Year

</label>

<select
name="batch_year"
class="form-select"
required>

<option value="">Select Batch</option>

<option value="2024">2024</option>

<option value="2025">2025</option>

<option value="2026">2026</option>

</select>

</div>

<div class="col-md-6">

<label class="form-label">

Section

</label>

<select
name="section"
class="form-select"
required>

<option value="">Select Section</option>

<option value="A">A</option>

<option value="B">B</option>

<option value="C">C</option>

</select>

</div>

</div>

<label class="upload-box w-100">

<i class="bi bi-cloud-arrow-up-fill"></i>

<h4 class="mt-3">

Click Here or Drag & Drop Excel File

</h4>

<p class="text-muted">

Accepted Format : .xlsx

</p>

<input

type="file"

name="excel_file"

id="excelFile"

accept=".xlsx,.xls"

hidden

required>

<div
class="file-name"
id="filename">

No File Selected

</div>

</label>

<br><br>

<button
type="submit"
class="btn btn-primary btn-upload">

<i class="bi bi-upload"></i>

Upload Students

</button>

</form>

<br>

<a href="{% url 'faculty_dashboard' %}"

class="btn btn-outline-secondary w-100">

<i class="bi bi-arrow-left-circle"></i>

Back to Dashboard

</a>

</div>

</div>

</div>

<script>

document.getElementById("excelFile").addEventListener("change",function(){

if(this.files.length>0){

document.getElementById("filename").innerHTML=this.files[0].name;

}

});

</script>

</body>

</html>
