<!DOCTYPE html>
<html>

<head>

    <title>Upload Question Bank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#eef2f7;
        }

        .card{
            margin-top:40px;
            border-radius:15px;
        }

        .card-header{
            background:#0d6efd;
            color:white;
            font-size:24px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow">

<div class="card-header">

Upload Question Bank

</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <div class="mb-3">

        <label>Select Quiz</label>

        <select name="quiz" class="form-control" required>

            <option value="">Select Quiz</option>

            {% for q in quizzes %}

            <option value="{{ q.id }}">

                {{ q.title }}
                -
                {{ q.subject_name }}
                -
                {{ q.department.department_name }}
                -
                Year {{ q.year }}
                -
                Sec {{ q.section }}

            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">

        <label>Question Bank Excel</label>

        <input
            type="file"
            name="question_file"
            class="form-control"
            accept=".xlsx,.xls"
            required>

    </div>

    <button class="btn btn-primary w-100">

        Upload Question Bank

    </button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
